name: Release

# Tag-driven, free distribution: tag vX.Y.Z with an annotation whose subject is the
# release title (e.g. `git tag -a v0.0.1 -m "Beta 1"`). Builds an ad-hoc-signed DMG and
# publishes it as a pre-release — no Apple Developer ID or repository secrets required.
on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      # Full history so the annotated tag object (release title) is available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release
        run: swift build -c release --product GlowUpApp

      - name: Generate app icon
        run: swift packaging/make-icon.swift && iconutil -c icns packaging/GlowUp.iconset -o packaging/AppIcon.icns

      - name: Assemble app bundle + DMG
        run: bash packaging/make-dmg.sh

      # Ad-hoc signature is the minimum for an arm64 bundle to launch; it is NOT notarization.
      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - dist/GlowUp.app
          codesign --verify --strict dist/GlowUp.app

      - name: Repackage the signed app into the DMG
        run: hdiutil create -volname "GlowUp" -srcfolder dist/GlowUp.app -ov -format UDZO dist/GlowUp.dmg

      - name: Release title from the tag annotation
        id: meta
        run: |
          name="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:subject)')"
          [ -n "$name" ] || name="${GITHUB_REF_NAME}"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: dist/GlowUp.dmg
          body: |
            **Unsigned (ad-hoc) build — free and open source (MIT), not notarized.**

            macOS quarantines a downloaded, unsigned app. After moving GlowUp to /Applications, clear it once:

                xattr -dr com.apple.quarantine /Applications/GlowUp.app

            Or build from source: `swift build -c release --product GlowUpApp`
